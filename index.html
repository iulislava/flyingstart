<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой магазин</title>
    <style>
        /* --- CSS STYLES --- */
        
        /* Базовые настройки шрифта и цветов */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #b6a1c4;
            margin: 0;
            padding: 0;
            color: #a1c4a4;
        }

        /* Шапка сайта */
        header {
            background-color: #b989dc;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 { margin: 0; }

        /* Контейнер для сетки товаров */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Сетка карточек товаров (Grid) */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        /* Стиль карточки товара */
        .product-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        /* Картинка в карточке */
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        /* Информация внутри карточки */
        .card-info {
            padding: 20px;
            flex-grow: 1; /* Чтобы кнопки были на одном уровне */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-info h3 { margin-top: 0; }
        .price { font-size: 1.2em; font-weight: bold; color: #27ae60; margin: 10px 0; }
        
        /* Кнопка "Купить" в карточке */
        .btn-buy {
            background-color: #b989dc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 1em;
            transition: background 0.3s;
        }

        .btn-buy:hover { background-color: #2980b9; }

        /* --- MODAL WINDOW (Модальное окно) --- */
        .modal {
            display: none; /* Скрыто по умолчанию */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8); /* Затемнение фона */
            justify-content: center;
            align-items: center;
        }

        /* Контент модального окна */
        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 800px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Кнопка закрытия (крестик) */
        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #aaa;
        }
        .close-btn:hover { color: black; }

        /* --- CAROUSEL (Карусель картинок) --- */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 300px; /* Высота слайдера */
            margin-bottom: 20px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
        }

        .carousel-slide {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* Скрываем все слайды */
        }
        
        .carousel-slide.active { display: block; } /* Показываем активный */

        /* Кнопки навигации карусели */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 18px;
            border-radius: 50%;
        }
        .prev { left: 10px; }
        .next { right: 10px; }

        /* Описание товара в модальном окне */
        .modal-details h2 { margin-top: 0; }
        .modal-price { font-size: 1.5em; color: #27ae60; font-weight: bold; }
        .modal-desc { line-height: 1.6; color: #555; margin-bottom: 20px; }

    </style>
</head>
<body>

    <!-- Шапка -->
    <header>
        <h1>Курсы по чтению</h1>
        <p>Читаем на английском</p>
    </header>

    <!-- Основная витрина товаров -->
    <div class="container">
        <div class="product-grid">

            <!-- ТОВАР 1 -->
            <!-- Замените src на ссылку на вашу картинку -->
            <div class="product-card" 
                 data-title="Alice in Wonderland" 
                 data-price="500Р" 
                 data-desc="A fully responsive HTML/CSS template for online stores. Includes dark mode, cart functionality, and clean code structure."
                 data-images='["https://via.placeholder.com/800x400/3498db/ffffff?text=Shop+1", "https://via.placeholder.com/800x400/2980b9/ffffff?text=Shop+2", "https://via.placeholder.com/800x400/1abc9c/ffffff?text=Shop+3"]'
                 data-link="https://your-payment-link-1.com">
                
                <img src="D:\09 Марафон_Интерактивные пдф\магазин\Алиса.png" alt="">
                <div class="card-info">
                    <div>
                        <h3>Alice in Wonderland</h3>
                        <p>L.Carroll</p>
                    </div>
                    <div>
                        <div class="price">500Р</div>
                        <button class="btn-buy">Купить</button>
                    </div>
                </div>
            </div>

            <!-- ТОВАР 2 -->
            <div class="product-card" 
                 data-title="The Jungle Book" 
                 data-price="500Р" 
                 data-desc="A lightweight JavaScript task manager with local storage support. Features drag-and-drop and priority tags."
                 data-images='["https://via.placeholder.com/800x400/e74c3c/ffffff?text=Task+App+1", "https://via.placeholder.com/800x400/c0392b/ffffff?text=Task+App+2"]'
                 data-link="https://your-payment-link-2.com">
                
                <img src="D:\09 Марафон_Интерактивные пдф\магазин\Маугли.png" alt="">
                <div class="card-info">
                    <div>
                        <h3>The Jungle Book</h3>
                        <p>R. Kipling</p>
                    </div>
                    <div>
                        <div class="price">500Р</div>
                        <button class="btn-buy">Купить</button>
                    </div>
                </div>
            </div>

            <!-- ТОВАР 3 -->
            <div class="product-card" 
                 data-title="Peter Pan" 
                 data-price="500Р" 
                 data-desc="Professional dashboard UI kit with charts, tables, and sidebar navigation. Built with Tailwind CSS."
                 data-images='["https://via.placeholder.com/800x400/8e44ad/ffffff?text=Dashboard+1", "https://via.placeholder.com/800x400/9b59b6/ffffff?text=Dashboard+2", "https://via.placeholder.com/800x400/34495e/ffffff?text=Dashboard+3"]'
                 data-link="https://your-payment-link-3.com">
                
                <img src="D:\09 Марафон_Интерактивные пдф\магазин\Питер.png" alt="">
                <div class="card-info">
                    <div>
                        <h3>Peter and Wendy</h3>
                        <p>J.M. Barrie</p>
                    </div>
                    <div>
                        <div class="price">500Р</div>
                        <button class="btn-buy">Купить</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Модальное окно (скрыто по умолчанию) -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            
            <!-- Карусель картинок -->
            <div class="carousel-container">
                <button class="carousel-btn prev">&#10094;</button>
                <div id="carousel-images">
                    <!-- Сюда скрипт вставит картинки -->
                </div>
                <button class="carousel-btn next">&#10095;</button>
            </div>

            <!-- Детали товара -->
            <div class="modal-details">
                <h2 id="modal-title">Product Title</h2>
                <div class="modal-price" id="modal-price">$0.00</div>
                <p class="modal-desc" id="modal-desc">Description goes here...</p>
                
                <!-- Кнопка покупки в модальном окне -->
                <a id="modal-buy-link" href="#" target="_blank" class="btn-buy" style="display:block; text-align:center; text-decoration:none;">
                    Buy Now
                </a>
            </div>
        </div>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        // Получаем элементы
        const modal = document.getElementById('productModal');
        const closeBtn = document.querySelector('.close-btn');
        const cards = document.querySelectorAll('.product-card');
        
        // Элементы внутри модального окна
        const modalTitle = document.getElementById('modal-title');
        const modalPrice = document.getElementById('modal-price');
        const modalDesc = document.getElementById('modal-desc');
        const modalBuyLink = document.getElementById('modal-buy-link');
        const carouselContainer = document.getElementById('carousel-images');
        
        // Кнопки карусели
        const prevBtn = document.querySelector('.prev');
        const nextBtn = document.querySelector('.next');
        let currentSlide = 0;
        let slides = [];

        // 1. Открытие модального окна
        cards.forEach(card => {
            card.querySelector('.btn-buy').addEventListener('click', () => {
                // Читаем данные из data-атрибутов карточки
                const title = card.getAttribute('data-title');
                const price = card.getAttribute('data-price');
                const desc = card.getAttribute('data-desc');
                const link = card.getAttribute('data-link');
                // Парсим массив картинок из строки JSON
                const images = JSON.parse(card.getAttribute('data-images'));

                // Заполняем модальное окно данными
                modalTitle.innerText = title;
                modalPrice.innerText = price;
                modalDesc.innerText = desc;
                modalBuyLink.href = link;

                // Настраиваем карусель
                setupCarousel(images);

                // Показываем окно
                modal.style.display = 'flex';
            });
        });

        // 2. Закрытие модального окна
        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        // Закрытие при клике вне контента
        window.addEventListener('click', (e) => {
            if (e.target == modal) {
                modal.style.display = 'none';
            }
        });

        // 3. Логика карусели
        function setupCarousel(images) {
            carouselContainer.innerHTML = ''; // Очистить старые картинки
            slides = [];
            currentSlide = 0;

            if(images.length === 0) return;

            // Создаем элементы IMG
            images.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.classList.add('carousel-slide');
                if (index === 0) img.classList.add('active'); // Первая активна
                carouselContainer.appendChild(img);
                slides.push(img);
            });
        }

        function showSlide(index) {
            if (index < 0) index = slides.length - 1;
            if (index >= slides.length) index = 0;

            slides.forEach(slide => slide.classList.remove('active'));
            slides[index].classList.add('active');
            currentSlide = index;
        }

        prevBtn.addEventListener('click', () => {
            showSlide(currentSlide - 1);
        });

        nextBtn.addEventListener('click', () => {
            showSlide(currentSlide + 1);
        });

    </script>
</body>
</html>
